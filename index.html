<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Controle Financeiro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h2 id="mesAtual"></h2>

<div class="form">
<input type="text" id="descricao" placeholder="Descrição">

<select id="tipo">
<option value="fixo">Contas Fixas</option>
<option value="compras">Compras</option>
<option value="higiene">Higiene</option>
<option value="entrada">Entradas</option>
</select>

<input type="number" id="valor" placeholder="Valor">
<button onclick="adicionar()">Adicionar</button>
</div>

<!-- BOTÃO PDF -->
<button onclick="gerarPDFManual()" style="margin-bottom:15px;">
Gerar PDF Agora
</button>

<div class="box vermelho">
<h3>CONTAS FIXAS</h3>
<ul id="fixo"></ul>
<p>Total: <span id="total-fixo">R$ 0</span></p>
</div>

<div class="box amarelo">
<h3>COMPRAS</h3>
<ul id="compras"></ul>
<p>Total: <span id="total-compras">R$ 0</span></p>
</div>

<div class="box azul">
<h3>HIGIENE</h3>
<ul id="higiene"></ul>
<p>Total: <span id="total-higiene">R$ 0</span></p>
</div>

<div class="box verde">
<h3>ENTRADAS</h3>
<ul id="entrada"></ul>
<p>Total: <span id="total-entrada">R$ 0</span></p>
</div>

</div>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="script.js"></script>
</body>
</html>
